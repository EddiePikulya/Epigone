name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: epigone
          POSTGRES_PASSWORD: epigone
          POSTGRES_DB: epigone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epigone"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest -q
        env:
          TEST_DATABASE_URL: postgresql://epigone:epigone@localhost:5432/epigone_test
