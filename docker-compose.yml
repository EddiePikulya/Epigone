services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: epigone
      POSTGRES_PASSWORD: epigone
      POSTGRES_DB: epigone
    ports:
      # Bind Postgres to loopback only: reachable locally (tests, psql) but never
      # from the public internet on a deployed server. Services reach it over the
      # compose network by hostname, not this mapping.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epigone"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  bot:
    build: .
    command: ["/app/.venv/bin/python", "-m", "epigone.bot.main"]
    environment:
      DATABASE_URL: postgresql://epigone:epigone@postgres:5432/epigone
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ingest:
    build: .
    command: ["/app/.venv/bin/python", "-m", "epigone.ingest.main"]
    environment:
      DATABASE_URL: postgresql://epigone:epigone@postgres:5432/epigone
      # Coarse Universe re-seed cadence (issue #50); unset → 60-min default.
      SEED_INTERVAL_MINUTES: ${SEED_INTERVAL_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  stream:
    build: .
    command: ["/app/.venv/bin/python", "-m", "epigone.stream.main"]
    environment:
      DATABASE_URL: postgresql://epigone:epigone@postgres:5432/epigone
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Proactive health-check (issue #52): evaluates liveness/freshness signals on a
  # short cadence and DMs the admin on Telegram — problem alerts, recoveries, and
  # a daily "all good" heartbeat. Send-only (no polling), so it shares the bot
  # token with `bot` without the two-poller conflict. All HEALTHCHECK_* knobs are
  # optional and default safely (see epigone.monitor.config).
  monitor:
    build: .
    command: ["/app/.venv/bin/python", "-m", "epigone.monitor.main"]
    environment:
      DATABASE_URL: postgresql://epigone:epigone@postgres:5432/epigone
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      # Sets the default coarse-staleness window (2× this); matches ingest's cadence.
      SEED_INTERVAL_MINUTES: ${SEED_INTERVAL_MINUTES:-60}
      # The disk-headroom check reads the host root mounted read-only below.
      HEALTHCHECK_DISK_PATH: /host
    volumes:
      # Host filesystem, read-only: gives the disk check real server headroom
      # (backups + fine_trades growth), not the container image's view.
      - /:/host:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
